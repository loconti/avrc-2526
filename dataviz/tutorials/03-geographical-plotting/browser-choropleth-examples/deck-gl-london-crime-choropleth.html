<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>deck.gl Choropleth: London Crime Score by MSOA</title>
    <style>
        html, body { margin: 0; height: 100%; font-family: "Source Sans 3", "Segoe UI", sans-serif; background: #f4f4f4; color: #111; }
        #page  { position: relative; height: 100%; }
        #map   { height: 100%; width: 100%; }

        /* ── Shared panel style ─────────────────────────────────────────── */
        .panel {
            position: absolute;
            z-index: 2;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #d8d8d8;
            border-radius: 10px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
        }
        .title-panel  { top: 16px; left: 16px; max-width: 420px; padding: 14px 16px; }
        .title-panel h1 { margin: 0; font-size: 1.35rem; line-height: 1.15; }
        .title-panel p  { margin: 8px 0 0; font-size: 0.98rem; line-height: 1.35; color: #3f3f3f; }
        .home-link {
            top: 16px;
            right: 16px;
            padding: 10px 14px;
            font-size: 0.92rem;
            font-weight: 700;
            color: #111;
            text-decoration: none;
        }
        .home-link:hover { border-color: #9d3c1f; color: #9d3c1f; }
        .legend-panel { right: 16px; bottom: 16px; padding: 12px 14px; width: 250px; }
        .legend-title  { margin-bottom: 8px; font-size: 0.95rem; font-weight: 700; }
        .legend-row    { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 0.92rem; color: #111; }
        .legend-swatch { width: 16px; height: 16px; border: 1px solid rgba(0, 0, 0, 0.18); flex: 0 0 auto; }

        /* ── Modal shown on click ────────────────────────────────────────── */
        .modal-backdrop {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 24px;
            background: rgba(17, 17, 17, 0.24);
        }
        .modal-backdrop.is-open { display: flex; }
        .modal-card {
            width: min(360px, calc(100vw - 48px));
            padding: 16px 18px;
        }
        .modal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .modal-header h2 {
            margin: 0;
            font-size: 1.02rem;
            line-height: 1.2;
        }
        .modal-close {
            border: 1px solid #d8d8d8;
            background: #fff;
            color: #111;
            border-radius: 999px;
            padding: 6px 10px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        .modal-close:hover { border-color: #9d3c1f; color: #9d3c1f; }
        .modal-grid        { display: grid; grid-template-columns: auto 1fr; gap: 4px 10px; font-size: 0.92rem; }
        .modal-grid strong { white-space: nowrap; }

        /* ── Attribution ────────────────────────────────────────────────── */
        #attribution { position: absolute; bottom: 8px; left: 8px; z-index: 2; font-size: 0.75rem; color: #333; background: rgba(255, 255, 255, 0.8); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>

<body>
    <div id="page">
        <div class="panel title-panel">
            <h1 id="map-title">Loading map…</h1>
            <p id="map-subtitle"></p>
        </div>
        <a class="panel home-link" href="./index.html">Back</a>
        <div id="map"></div>
        <div id="legend" class="panel legend-panel"></div>
        <div id="modal-backdrop" class="modal-backdrop" aria-hidden="true">
            <div class="panel modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
                <div class="modal-header">
                    <h2 id="modal-title">Area details</h2>
                    <button id="modal-close" class="modal-close" type="button">Close</button>
                </div>
                <div id="modal-content" class="modal-grid"></div>
            </div>
        </div>
        <div id="attribution">&copy; OpenStreetMap contributors &copy; CARTO</div>
    </div>

    <script src="https://unpkg.com/deck.gl@9.0.17/dist.min.js"></script>
    <script>
        const DATA_URL = "./data/london-imd-crime-quantiles.geojson";
        const META_URL = "./data/london-imd-crime-quantiles-meta.json";

        // ── Shared content helpers ───────────────────────────────────────────
        function buildLegendHTML(meta) {
            const rows = meta.labels.map((label, i) =>
                `<div class="legend-row"><span class="legend-swatch" style="background:${meta.colors[i]}"></span><span>${label}</span></div>`
            ).join("");
            return `<div class="legend-title">${meta.legend_title}</div>${rows}`;
        }

        function buildTooltipHTML(props, meta) {
            return meta.tooltip.fields.map((f, i) =>
                `<strong>${meta.tooltip.aliases[i]}:</strong> ${props[f]}`
            ).join("<br>");
        }

        function buildDetailsHTML(props, meta) {
            return meta.popup.fields.map((f, i) =>
                `<strong>${meta.popup.aliases[i]}:</strong><span>${props[f]}</span>`
            ).join("");
        }

        // ── deck.gl-specific helpers ─────────────────────────────────────────
        function hexToRgb(hex) {
            const c = hex.replace("#", "");
            return [parseInt(c.slice(0, 2), 16), parseInt(c.slice(2, 4), 16), parseInt(c.slice(4, 6), 16)];
        }

        function getBaseBorderStyle(meta) {
            return {
                color: [...hexToRgb(meta.line_color), 255],
                width: meta.line_width
            };
        }

        function getHoverBorderStyle(meta) {
            return {
                color: [...hexToRgb(meta.hover_line_color), 255],
                width: meta.hover_line_width
            };
        }

        function getViewportPadding(element) {
            return {
                top: Math.round(element.clientHeight * 0.20),
                bottom: Math.round(element.clientHeight * 0.20),
                left: Math.round(element.clientWidth * 0.20),
                right: Math.round(element.clientWidth * 0.20)
            };
        }

        function buildInitialViewState(meta, container) {
            const viewport = new deck.WebMercatorViewport({
                width: container.clientWidth,
                height: container.clientHeight
            }).fitBounds(
                [[meta.bounds[0], meta.bounds[1]], [meta.bounds[2], meta.bounds[3]]],
                { padding: getViewportPadding(container) }
            );
            return {
                longitude: viewport.longitude,
                latitude: viewport.latitude,
                zoom: viewport.zoom,
                bearing: 0,
                pitch: 0
            };
        }

        function createBasemapLayer() {
            return new deck.TileLayer({
                id: "carto-positron",
                data: "https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png",
                minZoom: 0,
                maxZoom: 19,
                tileSize: 256,
                renderSubLayers: props => {
                    const [[west, south], [east, north]] = props.tile.boundingBox;
                    return new deck.BitmapLayer(props, {
                        data: null,
                        image: props.data,
                        bounds: [west, south, east, north]
                    });
                }
            });
        }

        function createChoroplethLayer(geojson, meta, alpha, borderStyle) {
            return new deck.GeoJsonLayer({
                id: "imd-crime",
                data: geojson,
                pickable: true,
                stroked: true,
                filled: true,
                lineWidthUnits: "pixels",
                lineWidthMinPixels: 1,
                getFillColor: feature => [...hexToRgb(meta.colors[feature.properties.crime_class]), alpha],
                getLineColor: () => borderStyle.color,
                getLineWidth: () => borderStyle.width
            });
        }

        function createHoverOutlineLayer(feature, hoverStyle) {
            return new deck.GeoJsonLayer({
                id: "imd-crime-hover-outline",
                data: feature,
                pickable: false,
                stroked: true,
                filled: false,
                lineWidthUnits: "pixels",
                lineWidthMinPixels: hoverStyle.width,
                getLineColor: hoverStyle.color,
                getLineWidth: hoverStyle.width
            });
        }

        function buildLayers(basemapLayer, choroplethLayer, hoveredObject, hoverStyle) {
            const layers = [basemapLayer, choroplethLayer];
            if (hoveredObject) {
                layers.push(createHoverOutlineLayer(hoveredObject, hoverStyle));
            }
            return layers;
        }

        Promise.all([
            fetch(META_URL).then(r => r.json()),
            fetch(DATA_URL).then(r => r.json())
        ]).then(([meta, geojson]) => {
            document.getElementById("map-title").textContent = meta.title;
            document.getElementById("map-subtitle").textContent = meta.subtitle;
            document.getElementById("legend").innerHTML = buildLegendHTML(meta);

            const container = document.getElementById("map");
            const modalBackdrop = document.getElementById("modal-backdrop");
            const modalContent = document.getElementById("modal-content");
            const modalTitle = document.getElementById("modal-title");
            const modalClose = document.getElementById("modal-close");
            const alpha = Math.round(meta.fill_opacity * 255);
            const borderStyle = getBaseBorderStyle(meta);
            const hoverStyle = getHoverBorderStyle(meta);
            const initialViewState = buildInitialViewState(meta, container);
            const basemapLayer = createBasemapLayer();
            const choroplethLayer = createChoroplethLayer(geojson, meta, alpha, borderStyle);

            let hoveredObject = null;
            let hoveredFeatureId = null;

            function closeModal() {
                modalBackdrop.classList.remove("is-open");
                modalBackdrop.setAttribute("aria-hidden", "true");
            }

            function openModal(object) {
                modalTitle.textContent = object.properties.msoa11nm;
                modalContent.innerHTML = buildDetailsHTML(object.properties, meta);
                modalBackdrop.classList.add("is-open");
                modalBackdrop.setAttribute("aria-hidden", "false");
            }

            const deckgl = new deck.Deck({
                parent: container,
                initialViewState,
                controller: true,
                layers: buildLayers(basemapLayer, choroplethLayer, hoveredObject, hoverStyle),
                getCursor: ({ isDragging, isHovering }) => {
                    if (isDragging) return "grabbing";
                    return isHovering ? "pointer" : "default";
                },
                getTooltip: ({ object }) => object && {
                    html: buildTooltipHTML(object.properties, meta),
                    style: {
                        backgroundColor: "rgba(255,255,255,0.96)",
                        color: "#111",
                        border: "1px solid #d8d8d8",
                        borderRadius: "8px",
                        boxShadow: "0 6px 16px rgba(0,0,0,0.14)",
                        fontSize: "0.92rem",
                        padding: "8px 10px"
                    }
                },
                onClick: info => {
                    if (!info.object) {
                        closeModal();
                        return;
                    }
                    openModal(info.object);
                },
                onHover: info => {
                    const nextObject = info.object || null;
                    const nextId = nextObject ? nextObject.properties.feature_id : null;
                    if (nextId !== hoveredFeatureId) {
                        hoveredObject = nextObject;
                        hoveredFeatureId = nextId;
                        deckgl.setProps({
                            layers: buildLayers(basemapLayer, choroplethLayer, hoveredObject, hoverStyle)
                        });
                    }
                }
            });

            modalClose.addEventListener("click", closeModal);
            modalBackdrop.addEventListener("click", event => {
                if (event.target === modalBackdrop) closeModal();
            });
            window.addEventListener("keydown", event => {
                if (event.key === "Escape") closeModal();
            });

        }).catch(err => {
            console.error("Unable to load the choropleth assets.", err);
            document.getElementById("map-title").textContent = "deck.gl example failed to load";
            document.getElementById("map-subtitle").textContent = "Check the console and make sure the files are served through a local web server.";
        });
    </script>
</body>

</html>
