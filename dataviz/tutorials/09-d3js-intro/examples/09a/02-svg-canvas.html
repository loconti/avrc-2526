<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>09a — SVG canvas</title>
    <style>
      h1 { font-size: 1.4em; margin-bottom: 0.3em; }
      .lead { color: #555; margin-top: 0; }
      .lead a { color: #0072B2; }
      body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
             line-height: 1.55; color: #222; font-size: 16px;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      svg { width: 100%; height: auto; max-width: 100%; display: block;
             border: 1px solid #ddd; background: white; }
      .axis text {
        font-size: 13px;
        fill: #555;
      }
      .axis path,
      .axis line {
        stroke: #bbb;
      }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </head>
  <body>
    <h1>09a §3 — Building an SVG canvas</h1>
    <p class="lead">Append an <code>&lt;svg&gt;</code> with explicit width and height; everything in the rest of L9 lives inside one of these. <a href="../../09a-building-svg-with-d3.html">Source tutorial &rarr;</a></p>

    <div id="canvas-target"></div>
    <script>
      d3.select("#canvas-target")
        .append("svg")
        .attr("width", 300)
        .attr("height", 150).attr("viewBox", `0 0 ${300} ${150}`).attr("preserveAspectRatio", "xMidYMid meet")
        .style("background", "#fafafa")
        .style("border", "1px solid #ddd");
    </script>
  </body>
</html>
