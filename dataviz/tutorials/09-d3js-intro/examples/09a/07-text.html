<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>09a — &lt;text&gt;</title>
    <style>
      h1 { font-size: 1.4em; margin-bottom: 0.3em; }
      .lead { color: #555; margin-top: 0; }
      .lead a { color: #0072B2; }
        body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
             line-height: 1.55; color: #222; font-size: 16px;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        svg { width: 100%; height: auto; max-width: 100%; display: block;
             border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <h1>09a §8 — &lt;text&gt;</h1>
    <p class="lead"><code>text-anchor</code> (start / middle / end) controls horizontal alignment; <code>font-size</code>, <code>font-weight</code>, <code>fill</code> and <code>stroke</code> control appearance. <a href="../../09a-building-svg-with-d3.html">Source tutorial &rarr;</a></p>

    <div id="demo"></div>
    <script>
        const svg = d3.select("#demo").append("svg")
            .attr("width", 600).attr("height", 150).attr("viewBox", `0 0 ${600} ${150}`).attr("preserveAspectRatio", "xMidYMid meet")
            .style("background", "#fafafa").style("border", "1px solid #ddd");

        // dotted vertical guides at the three x positions
        [150, 350, 550].forEach(x => {
            svg.append("line").attr("x1", x).attr("y1", 30).attr("x2", x).attr("y2", 60)
                .attr("stroke", "#bbb").attr("stroke-dasharray", "2,2");
        });
        svg.append("text").attr("x", 150).attr("y", 50).attr("text-anchor", "start").text("anchor=start");
        svg.append("text").attr("x", 350).attr("y", 50).attr("text-anchor", "middle").text("anchor=middle");
        svg.append("text").attr("x", 550).attr("y", 50).attr("text-anchor", "end").text("anchor=end");

        svg.append("text").attr("x", 30).attr("y", 120)
            .style("font-size", "11px").attr("fill", "#666").text("small");
        svg.append("text").attr("x", 110).attr("y", 120)
            .style("font-weight", 700).text("BOLD");
        svg.append("text").attr("x", 220).attr("y", 120)
            .attr("fill", "#0072B2").attr("stroke", "#1a1a1a").attr("stroke-width", 0.5)
            .text("stroked");
        svg.append("text").attr("x", 350).attr("y", 120)
            .style("font-family", "Georgia, serif").style("font-style", "italic")
            .text("italic serif");
    </script>
</body>
</html>
