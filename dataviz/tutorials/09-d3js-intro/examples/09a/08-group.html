<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>09a — &lt;g&gt; (transforms)</title>
    <style>
      h1 { font-size: 1.4em; margin-bottom: 0.3em; }
      .lead { color: #555; margin-top: 0; }
      .lead a { color: #0072B2; }
        body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
             line-height: 1.55; color: #222; font-size: 16px;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        svg { width: 100%; height: auto; max-width: 100%; display: block;
             border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <h1>09a §9 — &lt;g&gt; and transforms</h1>
    <p class="lead">A small &ldquo;house&rdquo; shape placed four ways: translated, translated + rotated, translated + scaled, and nested groups. <a href="../../09a-building-svg-with-d3.html">Source tutorial &rarr;</a></p>

    <div id="demo"></div>
    <script>
        const svg = d3.select("#demo").append("svg")
            .attr("width", 600).attr("height", 170).attr("viewBox", `0 0 ${600} ${170}`).attr("preserveAspectRatio", "xMidYMid meet")
            .style("background", "#fafafa").style("border", "1px solid #ddd");

        function house(parent) {
            parent.append("rect")
                .attr("x", -20).attr("y", -10).attr("width", 40).attr("height", 30)
                .attr("fill", "#0072B2");
            parent.append("path")
                .attr("d", "M -22 -10 L 0 -32 L 22 -10 Z")
                .attr("fill", "#E69F00");
        }

        house(svg.append("g").attr("transform", "translate(80, 80)"));
        svg.append("text").attr("x", 80).attr("y", 140).attr("text-anchor", "middle")
            .style("font-size", "12px").attr("fill", "#666").text("translate");

        house(svg.append("g").attr("transform", "translate(220, 80) rotate(20)"));
        svg.append("text").attr("x", 220).attr("y", 140).attr("text-anchor", "middle")
            .style("font-size", "12px").attr("fill", "#666").text("translate + rotate");

        house(svg.append("g").attr("transform", "translate(380, 80) scale(1.4)"));
        svg.append("text").attr("x", 380).attr("y", 140).attr("text-anchor", "middle")
            .style("font-size", "12px").attr("fill", "#666").text("translate + scale");

        const outer = svg.append("g").attr("transform", "translate(500, 60)");
        const inner = outer.append("g").attr("transform", "translate(40, 20) rotate(-15)");
        house(inner);
        svg.append("text").attr("x", 540).attr("y", 140).attr("text-anchor", "middle")
            .style("font-size", "12px").attr("fill", "#666").text("nested groups");
    </script>
</body>
</html>
