<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>09a — SVG coordinate system</title>
    <style>
      h1 { font-size: 1.4em; margin-bottom: 0.3em; }
      .lead { color: #555; margin-top: 0; }
      .lead a { color: #0072B2; }
        body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
             line-height: 1.55; color: #222; font-size: 16px;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        svg { width: 100%; height: auto; max-width: 100%; display: block;
             border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <h1>09a §10 — SVG coordinate system</h1>
    <p class="lead">The origin is at the top-left and y grows downward. Three points and arrows make the convention concrete. <a href="../../09a-building-svg-with-d3.html">Source tutorial &rarr;</a></p>

    <div id="coords"></div>
    <script>
        const svg = d3.select("#coords").append("svg")
            .attr("width", 360).attr("height", 220)
            .attr("viewBox", "0 0 360 220")
            .attr("preserveAspectRatio", "xMidYMid meet")
            .style("background", "#fafafa").style("border", "1px solid #ddd");

        const defs = svg.append("defs");
        defs.append("marker")
            .attr("id", "arrow")
            .attr("viewBox", "0 0 10 10")
            .attr("refX", 8).attr("refY", 5)
            .attr("markerWidth", 8).attr("markerHeight", 8)
            .attr("orient", "auto-start-reverse")
            .append("path").attr("d", "M 0 0 L 10 5 L 0 10 z").attr("fill", "#777");

        const g = svg.append("g").attr("transform", "translate(60, 40)");

        g.append("line").attr("x1", 0).attr("y1", 0).attr("x2", 220).attr("y2", 0)
            .attr("stroke", "#777").attr("stroke-width", 1.5)
            .attr("marker-end", "url(#arrow)");
        g.append("text").attr("x", 226).attr("y", 4)
            .style("font-size", "13px").attr("fill", "#555").text("x");

        g.append("line").attr("x1", 0).attr("y1", 0).attr("x2", 0).attr("y2", 140)
            .attr("stroke", "#777").attr("stroke-width", 1.5)
            .attr("marker-end", "url(#arrow)");
        g.append("text").attr("x", -4).attr("y", 152).attr("text-anchor", "end")
            .style("font-size", "13px").attr("fill", "#555").text("y");

        const points = [
            { cx: 0,   cy: 0,  label: "(0, 0)",   anchor: "start", dx:  10, dy: -10 },
            { cx: 120, cy: 0,  label: "(120, 0)", anchor: "start", dx:  10, dy: -10 },
            { cx: 0,   cy: 60, label: "(0, 60)",  anchor: "start", dx:  10, dy:   4 }
        ];
        points.forEach(p => {
            g.append("circle").attr("cx", p.cx).attr("cy", p.cy).attr("r", 6)
                .attr("fill", "#0072B2");
            g.append("text").attr("x", p.cx + p.dx).attr("y", p.cy + p.dy)
                .attr("text-anchor", p.anchor)
                .style("font-size", "13px").attr("fill", "#333").text(p.label);
        });
    </script>
</body>
</html>
