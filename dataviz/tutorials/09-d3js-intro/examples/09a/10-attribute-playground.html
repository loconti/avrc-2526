<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>09a — attribute playground</title>
    <style>
      h1 { font-size: 1.4em; margin-bottom: 0.3em; }
      .lead { color: #555; margin-top: 0; }
      .lead a { color: #0072B2; }
        body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
             line-height: 1.55; color: #222; font-size: 16px;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        svg { width: 100%; height: auto; max-width: 100%; display: block;
             border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
        label { margin-right: 1em; font-size: 0.95em; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <h1>09a §11 — Attribute playground</h1>
    <p class="lead">Three sliders, one circle. Each slider is a plain DOM listener that updates one attribute via <code>d3.select</code>. <a href="../../09a-building-svg-with-d3.html">Source tutorial &rarr;</a></p>

    <div>
      <label>cx: <input type="range" id="slider-cx" min="0" max="480" value="240"><span id="cx-val">240</span></label>
      <label>cy: <input type="range" id="slider-cy" min="0" max="240" value="120"><span id="cy-val">120</span></label>
      <label>r:  <input type="range" id="slider-r"  min="2" max="60"  value="24"><span  id="r-val">24</span></label>
    </div>
    <div id="playground"></div>
    <script>
        const playground = d3.select("#playground").append("svg")
            .attr("width", 540).attr("height", 300).attr("viewBox", `0 0 ${540} ${300}`).attr("preserveAspectRatio", "xMidYMid meet")
            .style("background", "#fafafa").style("border", "1px solid #ddd");
        const dot = playground.append("circle")
            .attr("cx", 240).attr("cy", 120).attr("r", 24)
            .attr("fill", "#0072B2").attr("opacity", 0.75);

        function wireSlider(id, attr, valueId) {
            d3.select("#" + id).on("input", function () {
                const v = +this.value;
                dot.attr(attr, v);
                document.getElementById(valueId).textContent = v;
            });
        }
        wireSlider("slider-cx", "cx", "cx-val");
        wireSlider("slider-cy", "cy", "cy-val");
        wireSlider("slider-r",  "r",  "r-val");
    </script>
</body>
</html>
