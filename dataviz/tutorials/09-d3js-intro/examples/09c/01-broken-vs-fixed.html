<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>09c — broken vs fixed</title>
    <style>
      h1 { font-size: 1.4em; margin-bottom: 0.3em; }
      .lead { color: #555; margin-top: 0; }
      .lead a { color: #0072B2; }
        body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
             line-height: 1.55; color: #222; font-size: 16px;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        svg { width: 100%; height: auto; max-width: 100%; display: block;
             border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="../_shared/utils.js"></script>
</head>
<body>
    <h1>09c §1 — Why we need scales</h1>
    <p class="lead">Same nine values plotted twice: with <code>cx = d</code> (most points fall outside) and with <code>cx = x(d)</code> via a <code>scaleLinear</code>. <a href="../../09c-scales-and-axes.html">Source tutorial &rarr;</a></p>

    <div id="broken"></div>
    <div id="fixed"></div>
    <script>
        function caption(plot, text, color = "#666") {
            return plot.append("text").attr("x", 0).attr("y", -8)
                .style("font-size", "12px").style("fill", color).text(text);
        }

        const data = [120, 480, 2400, 5500, 9800, 17000, 24000, 38000, 49500];

        // 1a. broken: cx = d, no scale
        {
            const c = makeCanvas("#broken", 90);
            caption(c.plot, "cx = d  (broken — most points fall outside the plot area)", "#D55E00");
            c.plot.selectAll("circle").data(data).join("circle")
                .attr("cx", d => d).attr("cy", c.innerH / 2).attr("r", 6)
                .attr("fill", "#D55E00").attr("opacity", 0.75);
        }

        // 1b. fixed: cx = x(d) with a linear scale
        {
            const c = makeCanvas("#fixed", 110);
            caption(c.plot, "cx = x(d)  with  scaleLinear().domain([0, 50000]).range([0, innerW])", "#009E73");
            const x = d3.scaleLinear().domain([0, 50000]).range([0, c.innerW]);
            c.plot.append("g").attr("class", "axis")
                .attr("transform", `translate(0, ${c.innerH})`)
                .call(d3.axisBottom(x).ticks(6, "~s"));
            c.plot.selectAll("circle").data(data).join("circle")
                .attr("cx", d => x(d)).attr("cy", c.innerH / 2).attr("r", 6)
                .attr("fill", "#0072B2").attr("opacity", 0.75);
        }
    </script>
</body>
</html>
