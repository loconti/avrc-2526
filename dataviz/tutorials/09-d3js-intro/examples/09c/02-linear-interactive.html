<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>09c — scaleLinear interactive</title>
    <style>
      h1 { font-size: 1.4em; margin-bottom: 0.3em; }
      .lead { color: #555; margin-top: 0; }
      .lead a { color: #0072B2; }
        body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
             line-height: 1.55; color: #222; font-size: 16px;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        svg { width: 100%; height: auto; max-width: 100%; display: block;
             border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
        label { margin-right: 1em; font-size: 0.95em; }
        code { background: rgba(175,184,193,0.25); padding: 0.15em 0.4em;
               border-radius: 4px; font-size: 0.94em; color: #24292f;
               font-family: ui-monospace, Menlo, monospace; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="../_shared/utils.js"></script>
</head>
<body>
    <h1>09c §2 — scaleLinear, interactively</h1>
    <p class="lead">Move the sliders to change the domain endpoints; the same nine points are remapped on the fly. <a href="../../09c-scales-and-axes.html">Source tutorial &rarr;</a></p>

    <p>
        <label>domain min: <input type="range" id="dom-min" min="-2000" max="20000" value="0"></label>
        <label>domain max: <input type="range" id="dom-max" min="20000" max="60000" value="50000"></label>
    </p>
    <div id="vis"></div>
    <p><code id="formula"></code></p>
    <script>
        const data = [120, 480, 2400, 5500, 9800, 17000, 24000, 38000, 49500];
        const c = makeCanvas("#vis", 130);
        const axisG = c.plot.append("g").attr("transform", `translate(0, ${c.innerH})`);
        const dotsG = c.plot.append("g");

        function render() {
            const dMin = +document.getElementById("dom-min").value;
            const dMax = +document.getElementById("dom-max").value;
            const x = d3.scaleLinear().domain([dMin, dMax]).range([0, c.innerW]);
            axisG.call(d3.axisBottom(x).ticks(8, "~s"));
            dotsG.selectAll("circle").data(data).join("circle")
                .attr("cy", c.innerH / 2).attr("r", 6)
                .attr("fill", "#0072B2").attr("opacity", 0.75)
                .transition().duration(250)
                .attr("cx", d => x(d));
            document.getElementById("formula").textContent =
                `pixel = (data − ${dMin}) / (${dMax} − ${dMin}) × ${c.innerW}`;
        }
        ["dom-min", "dom-max"].forEach(id =>
            document.getElementById(id).addEventListener("input", render));
        render();
    </script>
</body>
</html>
