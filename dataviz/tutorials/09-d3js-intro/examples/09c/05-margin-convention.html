<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>09c — margin convention</title>
    <style>
      h1 { font-size: 1.4em; margin-bottom: 0.3em; }
      .lead { color: #555; margin-top: 0; }
      .lead a { color: #0072B2; }
        body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
             line-height: 1.55; color: #222; font-size: 16px;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        svg { width: 100%; height: auto; max-width: 100%; display: block;
             border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="../_shared/utils.js"></script>
</head>
<body>
    <h1>09c §4 — Margin convention</h1>
    <p class="lead">Without margins (axis labels clipped) vs with margins (the inner <code>&lt;g&gt;</code> shifted to leave room for ticks). <a href="../../09c-scales-and-axes.html">Source tutorial &rarr;</a></p>

    <p style="font-weight: 600; color: #D55E00; margin-bottom: 0.3em;">
        Without margins — axis line at the SVG top edge; tick labels rendered above (y &lt; 0) are clipped.
    </p>
    <div id="no-margin"></div>
    <p style="font-weight: 600; color: #009E73; margin-top: 1.2em; margin-bottom: 0.3em;">
        With margins — labels have room and stay readable.
    </p>
    <div id="with-margin"></div>
    <script>
        // 4a. NO margins — measure the container's own width so the SVG fills
        //     the same horizontal space as the with-margins demo below.
        {
            const W = Math.floor(document.querySelector("#no-margin").getBoundingClientRect().width) || 700;
            const root = d3.select("#no-margin")
                .append("svg")
                    .attr("width", W)
                    .attr("height", 30)
                    .attr("viewBox", `0 0 ${W} 30`)
                    .attr("preserveAspectRatio", "xMidYMid meet")
                    .style("background", "#fafafa")
                    .style("border", "1px solid #ddd");
            const x = d3.scaleLinear().domain([0, 50000]).range([0, W]);
            root.append("g")
                .attr("transform", "translate(0, 0)")
                .call(d3.axisTop(x).ticks(6, "~s"));   // ticks render above y=0 → clipped
        }

        // 4b. With margins — makeCanvas pads the SVG and shifts the inner <g>
        //     so axis labels have room to render.
        {
            const c = makeCanvas("#with-margin", 80);
            const x = d3.scaleLinear().domain([0, 50000]).range([0, c.innerW]);
            c.plot.append("g")
                .attr("transform", `translate(0, ${c.innerH})`)
                .call(d3.axisBottom(x).ticks(6, "~s"));
        }
    </script>
</body>
</html>
