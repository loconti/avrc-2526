<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>09c — 2D y-range inversion</title>
    <style>
      h1 { font-size: 1.4em; margin-bottom: 0.3em; }
      .lead { color: #555; margin-top: 0; }
      .lead a { color: #0072B2; }
        body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
             line-height: 1.55; color: #222; font-size: 16px;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        svg { width: 100%; height: auto; max-width: 100%; display: block;
             border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="../_shared/utils.js"></script>
</head>
<body>
    <h1>09c §5 — y-range inversion</h1>
    <p class="lead">Same nine 2D points twice — y-range <code>[0, innerH]</code> (large values at the bottom) and <code>[innerH, 0]</code> (large values at the top, the convention). <a href="../../09c-scales-and-axes.html">Source tutorial &rarr;</a></p>

    <div id="not-inv"></div>
    <div id="inv"></div>
    <script>
        function caption(plot, text, color = "#666") {
            return plot.append("text").attr("x", 0).attr("y", -8)
                .style("font-size", "12px").style("fill", color).text(text);
        }

        const data2D = [
            { x: 1, y: 8 }, { x: 2, y: 3 }, { x: 3, y: 5 }, { x: 4, y: 11 },
            { x: 5, y: 6 }, { x: 6, y: 9 }, { x: 7, y: 4 }, { x: 8, y: 13 }, { x: 9, y: 7 }
        ];

        function render(selector, label, yInverted) {
            const c = makeCanvas(selector, 240);
            caption(c.plot, label, yInverted ? "#009E73" : "#D55E00");
            const x = d3.scaleLinear().domain([0, 10]).range([0, c.innerW]);
            const y = d3.scaleLinear().domain([0, 14])
                .range(yInverted ? [c.innerH, 0] : [0, c.innerH]);
            c.plot.append("g").attr("transform", `translate(0, ${c.innerH})`)
                .call(d3.axisBottom(x).ticks(5));
            c.plot.append("g").call(d3.axisLeft(y).ticks(5));
            c.plot.selectAll("circle").data(data2D).join("circle")
                .attr("cx", d => x(d.x)).attr("cy", d => y(d.y))
                .attr("r", 5).attr("fill", "#0072B2").attr("opacity", 0.85);
        }
        render("#not-inv", "y-range = [0, innerH]  (NOT inverted — large values at the bottom)", false);
        render("#inv",     "y-range = [innerH, 0]  (inverted — large values at the top)", true);
    </script>
</body>
</html>
