<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>09d — d3.group / d3.rollup</title>
    <style>
      h1 { font-size: 1.4em; margin-bottom: 0.3em; }
      .lead { color: #555; margin-top: 0; }
      .lead a { color: #0072B2; }
        body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
             line-height: 1.55; color: #222; font-size: 16px;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        svg { width: 100%; height: auto; max-width: 100%; display: block;
             border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
        table { border-collapse: collapse; margin: 1em 0; }
        th, td { padding: 0.5em 0.8em; border-bottom: 1px solid #e1e4e8; text-align: left; }
        th { background: #f5f7fa; font-weight: 600; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <h1>09d §4 — d3.group / d3.rollup</h1>
    <p class="lead">Group rows by a key, then roll up each group with a reducer. The result is a <code>Map</code> ready to feed into a categorical scale. <a href="../../09d-loading-data.html">Source tutorial &rarr;</a></p>

    <table id="rollup">
        <thead><tr><th>continent</th><th>countries</th><th>mean lifeExp (2007)</th></tr></thead>
        <tbody></tbody>
    </table>
    <script>
        const fmtNum = d3.format(",.2f");

        d3.csv("../../datasets/gapminder.csv", d => ({
            country: d.country, continent: d.continent,
            year: +d.year, lifeExp: +d.lifeExp
        })).then(data => {
            const data2007 = data.filter(d => d.year === 2007);
            const countByContinent = d3.rollup(data2007, rows => rows.length, d => d.continent);
            const meanByContinent  = d3.rollup(data2007, rows => d3.mean(rows, d => d.lifeExp), d => d.continent);

            const continents = Array.from(meanByContinent.keys()).sort();
            const tb = document.querySelector("#rollup tbody");
            continents.forEach(c => {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${c}</td><td>${countByContinent.get(c)}</td><td>${fmtNum(meanByContinent.get(c))}</td>`;
                tb.appendChild(tr);
            });
        });
    </script>
</body>
</html>
