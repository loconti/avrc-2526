<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>09d — d3.format / timeFormat</title>
    <style>
      h1 { font-size: 1.4em; margin-bottom: 0.3em; }
      .lead { color: #555; margin-top: 0; }
      .lead a { color: #0072B2; }
        body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
             line-height: 1.55; color: #222; font-size: 16px;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        svg { width: 100%; height: auto; max-width: 100%; display: block;
             border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
        table { border-collapse: collapse; margin: 1em 0; }
        th, td { padding: 0.5em 0.8em; border-bottom: 1px solid #e1e4e8; text-align: left; }
        th { background: #f5f7fa; font-weight: 600; }
        code { font-family: ui-monospace, Menlo, monospace;
               background: rgba(175,184,193,0.25); padding: 0.1em 0.3em;
               border-radius: 3px; font-size: 0.9em; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <h1>09d §5 — d3.format / d3.timeFormat</h1>
    <p class="lead">Five common specifiers turning raw numbers and dates into chart-ready strings. <a href="../../09d-loading-data.html">Source tutorial &rarr;</a></p>

    <table id="formats">
        <thead><tr><th>Specifier</th><th>Input</th><th>Output</th></tr></thead>
        <tbody></tbody>
    </table>
    <script>
        const rows = [
            ['d3.format(",")',            1234567,  d3.format(",")(1234567)],
            ['d3.format("$,.0f")',        1234567,  d3.format("$,.0f")(1234567)],
            ['d3.format(".1%")',          0.0734,   d3.format(".1%")(0.0734)],
            ['d3.format("~s")',           2400,     d3.format("~s")(2400)],
            ['d3.format("~s")',           1.5e9,    d3.format("~s")(1.5e9)],
            ['d3.timeFormat("%Y-%m-%d")', "today",  d3.timeFormat("%Y-%m-%d")(new Date())]
        ];
        const tb = document.querySelector("#formats tbody");
        rows.forEach(([k, inp, out]) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td><code>${k}</code></td><td><code>${inp}</code></td><td><code>${out}</code></td>`;
            tb.appendChild(tr);
        });
    </script>
</body>
</html>
