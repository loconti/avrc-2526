<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>09e — Gapminder scatterplot</title>
    <style>
      h1 { font-size: 1.4em; margin-bottom: 0.3em; }
      .lead { color: #555; margin-top: 0; }
      .lead a { color: #0072B2; }
        body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
             line-height: 1.55; color: #222; font-size: 16px;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        svg { width: 100%; height: auto; max-width: 100%; display: block;
             border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="../_shared/utils.js"></script>
</head>
<body>
    <h1>09e — Gapminder scatterplot capstone</h1>
    <p class="lead">The complete chart end-to-end: selection, four scales, axes, data join, legend, and tooltips — every concept from L9 in one chart. <a href="../../09e-first-scatterplot.html">Source tutorial &rarr;</a></p>

    <div id="chart"></div>
    <script>
        const continents = ["Africa", "Americas", "Asia", "Europe", "Oceania"];
        const palette    = ["#009E73", "#D55E00", "#0072B2", "#CC79A7", "#E69F00"];

        d3.csv("../../datasets/gapminder.csv", d => ({
            country: d.country, continent: d.continent,
            year: +d.year, lifeExp: +d.lifeExp,
            pop: +d.pop, gdpPercap: +d.gdpPercap
        })).then(raw => {
            const data = raw.filter(d => d.year === 2007);

            const c = makeCanvas("#chart", 520, {
                width: 800,
                margin: { top: 70, right: 150 }
            });

            const x = d3.scaleLog()
                .domain(d3.extent(data, d => d.gdpPercap)).nice()
                .range([0, c.innerW]);
            const y = d3.scaleLinear()
                .domain(d3.extent(data, d => d.lifeExp)).nice()
                .range([c.innerH, 0]);
            const r = d3.scaleSqrt()
                .domain(d3.extent(data, d => d.pop)).range([3, 32]);
            const color = d3.scaleOrdinal().domain(continents).range(palette);

            c.root.append("text")
                .attr("x", c.margin.left).attr("y", 32)
                .style("font-size", "15px").style("font-weight", "bold")
                .text("Gapminder 2007 — life expectancy vs. GDP per capita");

            c.plot.append("g").attr("class", "axis")
                .attr("transform", `translate(0, ${c.innerH})`)
                .call(d3.axisBottom(x).ticks(6, "~s"));
            c.plot.append("g").attr("class", "axis").call(d3.axisLeft(y));

            c.plot.append("text")
                .attr("x", c.innerW / 2).attr("y", c.innerH + 30)
                .attr("text-anchor", "middle")
                .style("font-size", "12px").style("fill", "#555")
                .text("GDP per capita (log scale, USD)");
            c.plot.append("text")
                .attr("transform", `translate(-40, ${c.innerH / 2}) rotate(-90)`)
                .attr("text-anchor", "middle")
                .style("font-size", "12px").style("fill", "#555")
                .text("Life expectancy (years)");

            c.plot.selectAll("circle")
                .data(data).join("circle")
                .attr("cx", d => x(d.gdpPercap)).attr("cy", d => y(d.lifeExp))
                .attr("r", d => r(d.pop))
                .attr("fill", d => color(d.continent))
                .attr("opacity", 0.7).attr("stroke", "white")
                .append("title")
                .text(d => `${d.country}\nlife exp: ${d.lifeExp.toFixed(1)} yr` +
                           `\npop: ${d3.format(",")(d.pop)}` +
                           `\nGDP pc: ${d3.format("$,.0f")(d.gdpPercap)}`);

            const legend = c.plot.append("g")
                .attr("transform", `translate(${c.innerW + 20}, 10)`);
            legend.append("text")
                .attr("y", -6).style("font-weight", "bold").style("font-size", "12px")
                .text("Continent");
            const items = legend.selectAll("g.item")
                .data(continents).join("g")
                .attr("class", "item")
                .attr("transform", (d, i) => `translate(0, ${i * 22 + 10})`);
            items.append("circle").attr("r", 7).attr("fill", (d, i) => palette[i]).attr("opacity", 0.8);
            items.append("text").attr("x", 14).attr("y", 4).style("font-size", "12px").text(d => d);
        });
    </script>
</body>
</html>
