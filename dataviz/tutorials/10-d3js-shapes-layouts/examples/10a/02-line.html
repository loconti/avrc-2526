<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>10a — d3.line</title>
    <style>
        body { margin: 1em; font-family: -apple-system, BlinkMacSystemFont,
                                          "Segoe UI", Roboto, sans-serif; }
        svg  { border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="demo"></div>
    <script>
        const CANVAS = {
            width:  700,
            margin: { top: 24, right: 30, bottom: 36, left: 50 }
        };
        function makeCanvas(selector, height, opts = {}) {
            const m = { ...CANVAS.margin, ...(opts.margin || {}) };
            const w = opts.width ?? CANVAS.width;
            const innerW = w - m.left - m.right;
            const innerH = height - m.top - m.bottom;
            const root = d3.select(selector).append("svg")
                .attr("width", w).attr("height", height)
                .style("background", "#fafafa").style("border", "1px solid #ddd");
            const plot = root.append("g")
                .attr("transform", `translate(${m.left}, ${m.top})`);
            return { root, plot, innerW, innerH, margin: m, width: w, height };
        }
        const series = [
            { year: 2010, value: 24 }, { year: 2011, value: 38 },
            { year: 2012, value: 35 }, { year: 2013, value: 52 },
            { year: 2014, value: 48 }, { year: 2015, value: 67 },
            { year: 2016, value: 71 }, { year: 2017, value: 65 },
            { year: 2018, value: 82 }
        ];
        const c = makeCanvas("#demo", 280);
        const x = d3.scaleLinear().domain(d3.extent(series, d => d.year)).range([0, c.innerW]);
        const y = d3.scaleLinear().domain([0, d3.max(series, d => d.value)]).nice().range([c.innerH, 0]);
        c.plot.append("g").attr("class", "axis")
            .attr("transform", `translate(0, ${c.innerH})`)
            .call(d3.axisBottom(x).tickFormat(d3.format("d")));
        c.plot.append("g").attr("class", "axis").call(d3.axisLeft(y));

        const line = d3.line().x(d => x(d.year)).y(d => y(d.value));
        c.plot.append("path").datum(series).attr("d", line)
            .attr("fill", "none").attr("stroke", "#0072B2").attr("stroke-width", 2);
        c.plot.selectAll("circle").data(series).join("circle")
            .attr("cx", d => x(d.year)).attr("cy", d => y(d.value)).attr("r", 4)
            .attr("fill", "#0072B2");
    </script>
</body>
</html>
