<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>10b — scaleBand padding</title>
    <style>
        body { margin: 1em; font-family: -apple-system, BlinkMacSystemFont,
                                          "Segoe UI", Roboto, sans-serif; }
        svg  { border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="demo"></div>
    <script>
        const CANVAS = {
            width:  700,
            margin: { top: 24, right: 30, bottom: 36, left: 50 }
        };
        function makeCanvas(selector, height, opts = {}) {
            const m = { ...CANVAS.margin, ...(opts.margin || {}) };
            const w = opts.width ?? CANVAS.width;
            const innerW = w - m.left - m.right;
            const innerH = height - m.top - m.bottom;
            const root = d3.select(selector).append("svg")
                .attr("width", w).attr("height", height)
                .style("background", "#fafafa").style("border", "1px solid #ddd");
            const plot = root.append("g")
                .attr("transform", `translate(${m.left}, ${m.top})`);
            return { root, plot, innerW, innerH, margin: m, width: w, height };
        }
        const c = makeCanvas("#demo", 220, { margin: { top: 30, bottom: 50 } });
        const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        const rowH = (c.innerH - 30) / 3;
        const paddings = [0.05, 0.25, 0.5];
        paddings.forEach((pad, i) => {
            const x = d3.scaleBand().domain(days).range([0, c.innerW]).padding(pad);
            const yOff = i * rowH;
            c.plot.append("text").attr("x", 0).attr("y", yOff + 14)
                .style("font-size", "12px").attr("fill", "#666")
                .text(`padding(${pad})`);
            c.plot.selectAll(`rect.r${i}`).data(days).join("rect")
                .attr("class", `r${i}`)
                .attr("x", d => x(d)).attr("y", yOff + 22)
                .attr("width", x.bandwidth()).attr("height", rowH - 26)
                .attr("fill", "#0072B2").attr("opacity", 0.7);
        });
    </script>
</body>
</html>
