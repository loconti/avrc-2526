<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>10e — interactive Gapminder scatter</title>
    <style>
        body { margin: 1em; font-family: -apple-system, BlinkMacSystemFont,
                                          "Segoe UI", Roboto, sans-serif; }
        svg  { border: 1px solid #ddd; background: white; }
        .axis text { font-size: 13px; fill: #555; }
        .axis path, .axis line { stroke: #bbb; }
        #tooltip {
            position: absolute; pointer-events: none;
            background: rgba(20, 20, 20, 0.92); color: white;
            padding: 0.4em 0.7em; border-radius: 4px;
            font-size: 12px; line-height: 1.4;
            opacity: 0; transition: opacity 0.15s;
        }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <p style="margin-top: 1em;">
        <label style="display: inline-block; min-width: 8em;">Year: <span id="year-display">2007</span></label>
        <input type="range" id="year" min="1952" max="2007" step="5" value="2007"
               style="width: 320px; vertical-align: middle;">
    </p>
    <div id="chart"></div>
    <div id="tooltip"></div>
    <script>
        const CANVAS = {
            width:  700,
            margin: { top: 24, right: 30, bottom: 36, left: 50 }
        };
        function makeCanvas(selector, height, opts = {}) {
            const m = { ...CANVAS.margin, ...(opts.margin || {}) };
            const w = opts.width ?? CANVAS.width;
            const innerW = w - m.left - m.right;
            const innerH = height - m.top - m.bottom;
            const root = d3.select(selector).append("svg")
                .attr("width", w).attr("height", height)
                .style("background", "#fafafa").style("border", "1px solid #ddd");
            const plot = root.append("g")
                .attr("transform", `translate(${m.left}, ${m.top})`);
            return { root, plot, innerW, innerH, margin: m, width: w, height };
        }
        const continents = ["Africa", "Americas", "Asia", "Europe", "Oceania"];
        const palette    = ["#009E73", "#D55E00", "#0072B2", "#CC79A7", "#E69F00"];
        const colorOf    = d3.scaleOrdinal().domain(continents).range(palette);

        const c = makeCanvas("#chart", 480, {
            width: 800,
            margin: { top: 30, right: 150, bottom: 56, left: 64 }
        });
        const tip = d3.select("#tooltip");
        const yearDisplay = document.getElementById("year-display");

        let allData = [], currentYear = 2007, activeContinent = null;

        const x = d3.scaleLog().range([0, c.innerW]);
        const y = d3.scaleLinear().range([c.innerH, 0]);
        const r = d3.scaleSqrt().range([3, 32]);

        const xAxisG = c.plot.append("g").attr("class", "axis")
            .attr("transform", `translate(0, ${c.innerH})`);
        const yAxisG = c.plot.append("g").attr("class", "axis");

        c.plot.append("text")
            .attr("x", c.innerW / 2).attr("y", c.innerH + 40).attr("text-anchor", "middle")
            .style("font-size", "13px").attr("fill", "#555")
            .text("GDP per capita (log scale, USD)");
        c.plot.append("text")
            .attr("transform", `translate(-44, ${c.innerH / 2}) rotate(-90)`)
            .attr("text-anchor", "middle")
            .style("font-size", "13px").attr("fill", "#555")
            .text("Life expectancy (years)");

        const legend = c.plot.append("g").attr("transform", `translate(${c.innerW + 20}, 10)`);
        legend.append("text")
            .attr("y", -6).style("font-weight", "bold").style("font-size", "13px")
            .text("Continent");
        const legendItems = legend.selectAll("g.item").data(continents).join("g")
            .attr("class", "item")
            .attr("transform", (d, i) => `translate(0, ${i * 22 + 10})`)
            .style("cursor", "pointer")
            .on("click", (event, d) => {
                activeContinent = (activeContinent === d) ? null : d;
                legendItems.attr("opacity", item =>
                    activeContinent && item !== activeContinent ? 0.3 : 1);
                render();
            });
        legendItems.append("circle").attr("r", 8).attr("fill", d => colorOf(d)).attr("opacity", 0.85);
        legendItems.append("text").attr("x", 16).attr("y", 4).style("font-size", "13px").text(d => d);

        d3.csv("../../datasets/gapminder.csv", d => ({
            country: d.country, continent: d.continent,
            year: +d.year, lifeExp: +d.lifeExp,
            pop: +d.pop, gdpPercap: +d.gdpPercap
        })).then(rows => {
            allData = rows;
            x.domain(d3.extent(allData, d => d.gdpPercap)).nice();
            y.domain(d3.extent(allData, d => d.lifeExp)).nice();
            r.domain(d3.extent(allData, d => d.pop));
            xAxisG.call(d3.axisBottom(x).ticks(6, "~s"));
            yAxisG.call(d3.axisLeft(y));
            render();
        });

        function render() {
            const yearData = allData.filter(d => d.year === currentYear);
            const visible = activeContinent
                ? yearData.filter(d => d.continent === activeContinent)
                : yearData;
            c.plot.selectAll("circle.country")
                .data(visible, d => d.country)
                .join(
                    enter => enter.append("circle")
                        .attr("class", "country")
                        .attr("cx", d => x(d.gdpPercap)).attr("cy", d => y(d.lifeExp))
                        .attr("r", 0).attr("fill", d => colorOf(d.continent))
                        .attr("opacity", 0.7).attr("stroke", "white")
                        .style("cursor", "pointer")
                        .on("mouseover", (event, d) => {
                            d3.select(event.currentTarget).attr("stroke", "#1a1a1a").attr("stroke-width", 2);
                            tip.style("opacity", 1)
                               .html(`<b>${d.country}</b><br>${d.continent} · ${d.year}<br>` +
                                     `life exp: ${d.lifeExp.toFixed(1)} yr<br>` +
                                     `pop: ${d3.format(",")(d.pop)}<br>` +
                                     `GDP pc: ${d3.format("$,.0f")(d.gdpPercap)}`);
                        })
                        .on("mousemove", event => {
                            tip.style("left", (event.pageX + 14) + "px")
                               .style("top",  (event.pageY + 14) + "px");
                        })
                        .on("mouseout", event => {
                            d3.select(event.currentTarget).attr("stroke", "white").attr("stroke-width", 1);
                            tip.style("opacity", 0);
                        })
                        .call(en => en.transition().duration(400).attr("r", d => r(d.pop))),
                    update => update.transition().duration(400)
                        .attr("cx", d => x(d.gdpPercap)).attr("cy", d => y(d.lifeExp))
                        .attr("r", d => r(d.pop)),
                    exit => exit.transition().duration(300).attr("r", 0).remove()
                );
        }
        d3.select("#year").on("input", function () {
            currentYear = +this.value;
            yearDisplay.textContent = currentYear;
            render();
        });
    </script>
</body>
</html>
